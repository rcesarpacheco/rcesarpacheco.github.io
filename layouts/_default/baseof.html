<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ .Site.Params.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script>
    document.addEventListener('click', function(e) {
      document.querySelectorAll('details.slides-expand[open]').forEach(function(d) {
        if (!d.contains(e.target)) d.removeAttribute('open');
      });
    });
  </script>
</head>
<body>
  <div class="site-wrapper">
    {{ partial "sidebar.html" . }}
    <main class="content">
      {{ block "main" . }}{{ end }}
    </main>
  </div>
</body>
</html>
